name: Build and Release C# v2-dev

on:
  push:
    branches: [ "v2-dev" ] # Specifically watching your dev branch
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      # We tell dotnet to look for the .csproj specifically
      run: dotnet restore ./MediaControlApp/MediaControlApp.csproj

    - name: Build and Publish
      run: |
        dotnet publish ./MediaControlApp/MediaControlApp.csproj -c Release -r win-x64 --self-contained true `
        /p:PublishSingleFile=true /p:PublishReadyToRun=true /p:IncludeNativeLibrariesForSelfExtract=true `
        -o ./publish

    - name: Generate Tag
      id: tagger
      shell: bash
      run: echo "tag=v2-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tagger.outputs.tag }}
        files: ./publish/MediaControlApp.exe
        name: Media Control v2-Dev ${{ steps.tagger.outputs.tag }}
        body: |
          ### Dev Build (Branch: v2-dev)
          - Added Album Cover & App Icon Overlay.
          - Fixed Taskbar Hover Preview.
          - Single-file native C# build.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
