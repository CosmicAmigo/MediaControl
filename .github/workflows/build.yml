name: Build Media Control EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter Pillow pyinstaller winshell pywin32 winsdk

    - name: Build with PyInstaller
      run: |
        # We bundle all icons and the .ico file into the single EXE
        pyinstaller --noconsole --onefile `
        --icon="icon.ico" `
        --add-data "prev.png;." `
        --add-data "play.png;." `
        --add-data "next.png;." `
        --add-data "shuffle.png;." `
        --add-data "repeat.png;." `
        --add-data "icon.ico;." `
        --collect-submodules winsdk `
        --collect-all winsdk `
        --hidden-import winsdk.windows.media.control `
        --name "MediaControl" main.py

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: MediaControl-EXE
        path: dist/MediaControl.exe
