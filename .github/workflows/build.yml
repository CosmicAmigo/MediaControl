name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install
      run: |
        pip install customtkinter Pillow pyinstaller winshell pywin32 winsdk

    - name: Build
      run: |
        pyinstaller --noconsole --onefile `
        --collect-submodules winsdk `
        --collect-all winsdk `
        --hidden-import winsdk.windows.media.control `
        --name "MediaControl" main.py

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: MediaControl-v1.0
        path: dist/MediaControl.exe
      
    - name: Generate Tag Name
      id: tagger
      shell: bash
      run: |
        # Creates a tag based on date/time: vYYYY.MM.DD-HHMM
        TAG_NAME="v$(date +'%Y.%m.%d-%H%M')"
        echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tagger.outputs.tag }}
        files: dist/MediaControl.exe
        name: Media Control ${{ steps.tagger.outputs.tag }}
        body: |
          ### Latest Build
          - Fixed Source Name (Now shows VLC.EXE, etc.)
          - Moved Shuffle/Repeat to side of media buttons
          - Removed Volume slider (unstable)
          - Restored Cube trigger and fixed taskbar persistence
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
