name: Build and Release C# Media Control

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build and Publish
      run: |
        dotnet publish MediaControlApp.csproj -c Release -r win-x64 --self-contained true `
        /p:PublishSingleFile=true /p:PublishReadyToRun=true /p:IncludeNativeLibrariesForSelfExtract=true `
        -o ./publish

    - name: Generate Unique Tag
      id: tagger
      shell: bash
      run: echo "tag=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tagger.outputs.tag }}
        files: ./publish/MediaControlApp.exe
        name: Media Control Pro ${{ steps.tagger.outputs.tag }}
        body: |
          ### Pro C# Release
          - Single-file native executable.
          - Optimized for Windows 10/11.
          - Features taskbar hover preview and album art integration.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
